<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Funnel ROI Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #E1EDF5;
    --white-card: rgba(255,255,255,0.1);
    --border-card: #FFFFFF;
    --shadow-card: 0px 0px 80px rgba(0,0,0,0.18);
    --input-bg: #EEEEEE;
    --input-border: #8E8E8E;
    --placeholder: #8E8E8E;
    --label: #1E1E1E;
    --divider: #1E1E1E;
    --result-bg: #FFFFFF;
    --radius-card: 20px;
    --radius-input: 5px;
    --gap-card: 20px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 1280px;
    min-height: 100vh;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 100px 200px;
    gap: 30px;
  }

  /* ── HEADLINE ── */
  .headline {
    font-size: 60px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.05em;
    text-align: center;
    color: #000;
    width: 880px;
    max-width: 100%;
  }

  /* ── CARDS ── */
  .card {
    width: 100%;
    max-width: 650px;
    background: var(--white-card);
    border: 3px solid var(--border-card);
    box-shadow: var(--shadow-card);
    border-radius: var(--radius-card);
    padding: var(--gap-card);
    display: flex;
    flex-direction: column;
    gap: var(--gap-card);
  }

  /* ── CARD HEADER ── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-header svg { flex-shrink: 0; }
  .card-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: var(--label);
    line-height: 1;
  }

  /* ── FIELD ── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 100%;
  }
  .field-label {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.05em;
    color: var(--label);
    line-height: 1;
  }
  .field-input-wrap {
    display: flex;
    align-items: center;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius-input);
    padding: 15px;
    gap: 10px;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-input-wrap:focus-within {
    border-color: #555;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
  }
  .field-icon { flex-shrink: 0; display: flex; align-items: center; }
  .field-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.05em;
    color: #1E1E1E;
    outline: none;
    min-width: 0;
  }
  .field-input::placeholder { color: var(--placeholder); }
  /* hide number arrows */
  .field-input::-webkit-outer-spin-button,
  .field-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field-input[type=number] { -moz-appearance: textfield; }

  /* ── FORMULA ROW ── */
  .formula-wrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 100%;
  }
  .formula-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0;
    gap: 10px;
  }
  .formula-desc {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.05em;
    color: var(--placeholder);
    line-height: 1;
    flex: 1;
  }
  .formula-result {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: var(--label);
    line-height: 1;
    white-space: nowrap;
  }
  .formula-divider {
    width: 100%;
    height: 2px;
    background: var(--divider);
    border-radius: 999px;
  }

  /* ── RESULTS CARD ── */
  .results-row {
    display: flex;
    flex-direction: row;
    gap: 20px;
    width: 100%;
  }
  .result-box {
    flex: 1;
    background: var(--result-bg);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .result-title {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.05em;
    color: var(--placeholder);
    line-height: 1;
  }
  .result-value {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: var(--label);
    line-height: 1;
    transition: color 0.2s;
  }
  .result-value.highlight { color: #1E1E1E; }

  /* ── RETAINER ROW (inside revenue card) ── */
  /* second formula row for retainer */

  /* ── RESPONSIVE ── */

  /* Tablet */
  @media (max-width: 1024px) {
    .page {
      padding: 60px 40px;
    }
    .headline {
      font-size: 44px;
      width: 100%;
    }
    .card {
      max-width: 100%;
    }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .page {
      padding: 40px 20px;
      gap: 20px;
    }
    .headline {
      font-size: 30px;
      letter-spacing: -0.04em;
    }
    .card {
      padding: 16px;
      gap: 16px;
    }
    .field-label,
    .formula-desc,
    .formula-result { font-size: 16px; }
    .field-input { font-size: 16px; }
    .field-input-wrap { padding: 12px; }
    .result-value { font-size: 30px; }
    .result-title { font-size: 16px; }
    .results-row { gap: 12px; }
    .result-box { padding: 14px; gap: 6px; }
    .card-label { font-size: 13px; }
  }

  /* Very small screens */
  @media (max-width: 380px) {
    .results-row { flex-direction: column; }
    .headline { font-size: 26px; }
  }

  /* ── ANIMATED RESULT FLASH ── */
  @keyframes flash {
    0%   { opacity: 0.4; transform: scale(0.97); }
    100% { opacity: 1;   transform: scale(1); }
  }
  .flash { animation: flash 0.2s ease-out; }
</style>
</head>

<div class="page">

  <h1 class="headline">What could email do for your store?</h1>

      </svg>
      <span class="card-label">TRAFFIC &amp; SIGNUPS</span>
    </div>

    <!-- Monthly Average Site Traffic -->
    <div class="field">
      <div class="field-label">Monthly Average Site Traffic</div>
      <div class="field-input-wrap">
        <input class="field-input" id="site" type="number" placeholder="e.g. 50,000 visitors" min="0">
      </div>
    </div>

    <!-- Popup Form CVR -->
    <div class="field">
      <div class="field-label">Popup Form CVR</div>
      <div class="field-input-wrap">
        <input class="field-input" id="popup" type="number" placeholder="e.g. 3%" step="0.01" min="0" max="100">

      <div class="formula-row">
        <span class="formula-desc">Est. monthly email signups</span>
        <span class="formula-result" id="result-signups">—</span>
      </div>
      <div class="formula-divider"></div>
    </div>
  </div>

  <!-- ── CARD 2: REVENUE ── -->

    <!-- Average Order Value -->

      <div class="field-label">Average Order Value</div>

        <!-- $ icon -->
        <div class="field-icon">
          <svg width="12" height="19" viewBox="0 0 12 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.26989 18.1818V0H6.43466V18.1818H5.26989ZM8.35938 6.00142C8.30256 5.4285 8.05871 4.98343 7.62784 4.66619C7.19697 4.34896 6.61222 4.19034 5.87358 4.19034C5.37169 4.19034 4.94792 4.26136 4.60227 4.40341C4.25663 4.54072 3.99148 4.73248 3.80682 4.97869C3.62689 5.22491 3.53693 5.50426 3.53693 5.81676C3.52746 6.07718 3.58191 6.30445 3.70028 6.49858C3.82339 6.69271 3.99148 6.8608 4.20455 7.00284C4.41761 7.14015 4.66383 7.26089 4.94318 7.36506C5.22254 7.46449 5.52083 7.54972 5.83807 7.62074L7.14489 7.93324C7.77936 8.07528 8.36174 8.26468 8.89205 8.50142C9.42235 8.73816 9.88163 9.02936 10.2699 9.375C10.6581 9.72065 10.9588 10.1278 11.1719 10.5966C11.3897 11.0653 11.5009 11.6027 11.5057 12.2088C11.5009 13.099 11.2737 13.8707 10.8239 14.5241C10.3788 15.1728 9.73485 15.6771 8.89205 16.0369C8.05398 16.392 7.04309 16.5696 5.85938 16.5696C4.68513 16.5696 3.66241 16.3897 2.79119 16.0298C1.92472 15.67 1.24763 15.1373 0.759943 14.4318C0.276989 13.7216 0.0236743 12.8433 0 11.7969H2.97585C3.009 12.2846 3.14867 12.6918 3.39489 13.0185C3.64583 13.3404 3.97964 13.5843 4.39631 13.75C4.81771 13.911 5.29356 13.9915 5.82386 13.9915C6.3447 13.9915 6.79688 13.9157 7.1804 13.7642C7.56866 13.6127 7.86932 13.402 8.08239 13.1321C8.29546 12.8622 8.40199 12.5521 8.40199 12.2017C8.40199 11.875 8.30492 11.6004 8.1108 11.3778C7.9214 11.1553 7.64205 10.9659 7.27273 10.8097C6.90814 10.6534 6.4607 10.5114 5.9304 10.3835L4.34659 9.9858C3.12027 9.6875 2.15199 9.22112 1.44176 8.58665C0.731534 7.95218 0.378788 7.09754 0.383523 6.02273C0.378788 5.14205 0.613163 4.37263 1.08665 3.71449C1.56487 3.05635 2.22064 2.54261 3.05398 2.1733C3.88731 1.80398 4.83428 1.61932 5.89489 1.61932C6.97443 1.61932 7.91667 1.80398 8.72159 2.1733C9.53125 2.54261 10.161 3.05635 10.6108 3.71449C11.0606 4.37263 11.2926 5.13494 11.3068 6.00142H8.35938Z" fill="#1E1E1E"/>
          </svg>
        </div>
        <input class="field-input" id="aov" type="number" placeholder="e.g. 75" step="0.01" min="0">
      </div>
    </div>

    <!-- Formula: revenue = site * popup * welcome * aov -->
    <div class="formula-wrap">
      <div class="formula-row">
        <span class="formula-desc">Est. monthly email revenue</span>
        <span class="formula-result" id="result-revenue">—</span>
      </div>
      <div class="formula-divider"></div>
    </div>

    <!-- Retainer (fixed) -->
    <div class="formula-wrap">
      <div class="formula-row">
        <span class="formula-desc">Monthly retainer</span>
        <span class="formula-result" id="result-retainer">FIXED</span>
      </div>
      <div class="formula-divider"></div>
    </div>
  </div>

  <!-- ── CARD 3: RESULTS ── -->
  <div class="card">
    <div class="results-row">
      <div class="result-box">
        <div class="result-title">NEW REVENUE</div>
        <div class="result-value" id="display-revenue">—</div>
      </div>
      <div class="result-box">
        <div class="result-title">ROI</div>
        <div class="result-value" id="display-roi">—</div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Hidden retainer field logic ──
  // From Figma: retainer is "FIXED" — we'll make it editable but pre-filled
  // by adding a subtle input to the revenue card after aov

  // Insert retainer input into the retainer formula row
  const retainerResult = document.getElementById('result-retainer');
  // Make retainer editable inline
  const retainerInput = document.createElement('input');
  retainerInput.type = 'number';
  retainerInput.id = 'retainer';
  retainerInput.placeholder = 'Retainer $';
  retainerInput.min = '0';
  retainerInput.style.cssText = `
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: #1E1E1E;
    outline: none;
    text-align: right;
    width: 120px;
    min-width: 0;
  `;
  retainerInput.className = 'field-input';

  // Replace the static "FIXED" span with an input
  const retainerRow = retainerResult.parentElement;
  retainerRow.removeChild(retainerResult);
  retainerRow.appendChild(retainerInput);
  retainerInput.placeholder = 'Enter $';

  // ── Calculation ──
  function fmt(n) {
    if (!isFinite(n) || isNaN(n)) return '—';
    return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }
  function fmtCurrency(n) {
    if (!isFinite(n) || isNaN(n)) return '—';
    return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }
  function fmtROI(n) {
    if (!isFinite(n) || isNaN(n) || n <= 0) return '—';
    return n.toFixed(1) + 'x';
  }

  function flash(el) {
    el.classList.remove('flash');
    void el.offsetWidth; // reflow
    el.classList.add('flash');
  }

  function calculate() {
    const site    = parseFloat(document.getElementById('site').value)    || 0;
    const popup   = parseFloat(document.getElementById('popup').value)   || 0;
    const welcome = parseFloat(document.getElementById('welcome').value) || 0;
    const aov     = parseFloat(document.getElementById('aov').value)     || 0;
    const retainer= parseFloat(retainerInput.value)                      || 0;

    const signups = site * (popup / 100);
    const revenue = signups * (welcome / 100) * aov;
    const roi     = retainer > 0 ? revenue / retainer : NaN;

    const sigEl  = document.getElementById('result-signups');
    const revEl  = document.getElementById('result-revenue');
    const dRevEl = document.getElementById('display-revenue');
    const dRoiEl = document.getElementById('display-roi');

    const sigVal  = site && popup   ? fmt(signups)          : '—';
    const revVal  = site && popup && welcome && aov ? fmtCurrency(revenue) : '—';
    const roiVal  = site && popup && welcome && aov && retainer ? fmtROI(roi) : '—';

    if (sigEl.textContent !== sigVal)  { sigEl.textContent = sigVal;  flash(sigEl); }
    if (revEl.textContent !== revVal)  { revEl.textContent = revVal;  flash(revEl); }
    if (dRevEl.textContent !== revVal) { dRevEl.textContent = revVal; flash(dRevEl); }
    if (dRoiEl.textContent !== roiVal) { dRoiEl.textContent = roiVal; flash(dRoiEl); }
  }

  // Attach to all inputs
  ['site','popup','welcome','aov'].forEach(id => {
    document.getElementById(id).addEventListener('input', calculate);
  });
  retainerInput.addEventListener('input', calculate);
</script>
</body>
</html>
