<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>


body {

display:flex;
justify-content:center;
background:#E1EDF5;
margin:0;

font-family:Inter;

}


/* Desktop | Tablet | Mobile */

.desktop {

display:flex;
flex-direction:row;
align-items:flex-start;
gap:30px;

position:relative;

width:1280px;
height:1187px;

background:#E1EDF5;

}


/* Frame */

.frame {

display:flex;
flex-direction:column;
align-items:center;

padding:100px 200px;
gap:30px;

width:1280px;
height:1187px;

background:rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

}


/* Headline */

.headline {

width:880px;
height:120px;

font-size:60px;
font-weight:400;

line-height:100%;

text-align:center;

letter-spacing:-0.05em;

color:black;

}


/* Card */

.card {

display:flex;
flex-direction:column;

padding:20px;
gap:20px;

width:650px;
max-width:650px;
height:auto; /* Changed to auto to fit the result text */
min-height:292px;

background:rgba(255,255,255,0.1);

border:3px solid white;

border-radius:20px;

box-shadow:0 0 500px rgba(0,0,0,0.25);

}


/* Title row */

.titleRow {

display:flex;
flex-direction:row;

gap:5px;

align-items:center;

height:15px;

}


/* Title */

.title {

font-size:15px;
font-weight:700;
letter-spacing:-0.05em;

}


/* Input block */

.inputBlock {

display:flex;
flex-direction:column;

gap:5px;

width:610px;

}


.label {

font-size:20px;

}


.inputWrap {

display:flex;
align-items:center;

padding:15px;

background:#EEEEEE;

border:1px solid #8E8E8E;

border-radius:5px;

height:50px;

}


.inputWrap input {

border:none;
background:none;

font-size:20px;

width:100%;

outline:none;

}

/* Result Style */
.result {
    font-size: 24px;
    font-weight: 700;
    margin-top: 10px;
    color: #1E1E1E;
}



</style>

</head>

<body>


<div class="desktop">


<div class="frame">


<div class="headline">

Welcome Flow Revenue ROI Calculator

</div>



<div class="card">


<div class="titleRow">

<svg width="15" height="15" viewBox="0 0 15 15">
<path d="M7.5 0C3.35786 0 0 3.35786 0 7.5C0 11.6421 3.35786 15 7.5 15C11.6421 15 15 11.6421 15 7.5C15 3.35786 11.6421 0 7.5 0Z" fill="#1E1E1E"/>
</svg>

<div class="title">

TRAFFIC & SIGNUPS

</div>

</div>



<div class="inputBlock">

<div class="label">

Monthly Average Site Traffic

</div>

<div class="inputWrap">

<input type="number" id="traffic" placeholder="0" oninput="calculate()">

</div>

</div>



<div class="inputBlock">

<div class="label">

Popup Form CVR (%)

</div>

<div class="inputWrap">

<input type="number" id="cvr" placeholder="0" oninput="calculate()">

</div>

</div>

<div class="result">
    New Monthly Signups: <span id="signupCount">0</span>
</div>


</div>

</div>
</div>

<script>
function calculate() {
    const traffic = document.getElementById('traffic').value;
    const cvr = document.getElementById('cvr').value;
    const display = document.getElementById('signupCount');

    if (traffic && cvr) {
        // Simple calculation: Traffic * (CVR / 100)
        const total = (parseFloat(traffic) * (parseFloat(cvr) / 100)).toFixed(0);
        display.innerText = Number(total).toLocaleString();
    } else {
        display.innerText = "0";
    }
}
</script>

</body>
</html>
