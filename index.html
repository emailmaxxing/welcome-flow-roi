<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ROI Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Inter, sans-serif;
}

body {
  background: #E1EDF5;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 1280px;
  padding: 40px 20px;
}

.title {
  font-size: 60px;
  text-align: center;
  margin-bottom: 40px;
}

.card {
  background: rgba(255,255,255,0.2);
  border: 3px solid white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 30px;
  backdrop-filter: blur(10px);
}

.row {
  display: flex;
  gap: 20px;
}

.col {
  flex: 1;
}

label {
  font-size: 18px;
  display: block;
  margin-bottom: 5px;
}

input {
  width: 100%;
  height: 50px;
  padding: 10px;
  font-size: 18px;
  border: 1px solid #8E8E8E;
  background: #EEEEEE;
  border-radius: 5px;
}

.result-box {
  background: white;
  border-radius: 10px;
  padding: 20px;
  flex: 1;
}

.result-label {
  font-size: 18px;
  color: #888;
}

.result-value {
  font-size: 40px;
  font-weight: 700;
}


/* ---------- Tablet ---------- */

@media (max-width: 1000px) {

.title {
  font-size: 40px;
}

.row {
  flex-direction: column;
}

}


/* ---------- Mobile ---------- */

@media (max-width: 600px) {

.title {
  font-size: 28px;
}

input {
  height: 45px;
  font-size: 16px;
}

.result-value {
  font-size: 28px;
}

}

</style>
</head>

<body>

<div class="container">

<h1 class="title">
Welcome Flow Revenue ROI Calculator
</h1>


<div class="card">

<div class="col">

<label>Monthly Site Traffic</label>
<input id="traffic" type="number">

<label>Popup CVR (%)</label>
<input id="popup" type="number">

<label>Welcome Flow CVR (%)</label>
<input id="flow" type="number">

<label>Average Order Value ($)</label>
<input id="aov" type="number">

</div>

</div>


<div class="card">

<div class="row">

<div class="result-box">
<div class="result-label">Signups</div>
<div id="signups" class="result-value">0</div>
</div>

<div class="result-box">
<div class="result-label">Revenue</div>
<div id="revenue" class="result-value">$0</div>
</div>

<div class="result-box">
<div class="result-label">ROI</div>
<div id="roi" class="result-value">0x</div>
</div>

</div>

</div>

</div>


<script>

function calc() {

let traffic = parseFloat(document.getElementById("traffic").value) || 0
let popup = parseFloat(document.getElementById("popup").value) || 0
let flow = parseFloat(document.getElementById("flow").value) || 0
let aov = parseFloat(document.getElementById("aov").value) || 0

let signups = traffic * (popup / 100)

let revenue =
signups *
(flow / 100) *
aov

let roi =
revenue / 3000

document.getElementById("signups").innerText =
Math.round(signups)

document.getElementById("revenue").innerText =
"$" + Math.round(revenue)

document.getElementById("roi").innerText =
roi.toFixed(2) + "x"

}

document.querySelectorAll("input")
.forEach(i => i.addEventListener("input", calc))

</script>

</body>
</html>
